<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceForge Copilot</title>
  <link rel="stylesheet" href="/src/copilot-overlay.css" />
</head>
<body class="copilot-overlay-body">
  <div id="copilot-overlay-root" class="copilot-overlay-root" role="status" aria-live="polite">
    <div class="copilot-overlay-row">
      <div id="copilot-recording-indicator" class="copilot-recording-indicator" aria-hidden="true"></div>
      <div id="copilot-state-label" class="copilot-state-label">—</div>
    </div>
    <div id="copilot-transcript-snippet" class="copilot-transcript-snippet" aria-hidden="true"></div>
    <div id="copilot-ambiguity-hint" class="copilot-ambiguity-hint" aria-hidden="true"></div>
    <div id="copilot-cards" class="copilot-cards" aria-hidden="true" role="region" aria-label="Copilot cards">
      <div id="copilot-card-evidence" class="copilot-card copilot-card--evidence" data-card="evidence" hidden></div>
      <div id="copilot-card-answer" class="copilot-card copilot-card--answer" data-card="answer" hidden></div>
      <div id="copilot-card-dodont" class="copilot-card copilot-card--dodont" data-card="dodont" hidden></div>
      <div id="copilot-card-clarify" class="copilot-card copilot-card--clarify" data-card="clarify" hidden></div>
    </div>
  </div>
  <script type="module" src="/src/copilot-overlay.js"></script>
</body>
</html>
