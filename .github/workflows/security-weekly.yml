name: Weekly Security

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: security-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deps-and-static:
    runs-on: ubuntu-latest
    env:
      UV_VERSION: "0.8"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: uv run pip-audit --desc --ignore-vuln CVE-2025-69872
      # Block 7 (#65): run without ignore to detect when upstream fixes diskcache; remove this step when CVE is resolved
      - name: pip-audit (no ignore, expect fail until CVE-2025-69872 fixed)
        run: uv run pip-audit --desc
        continue-on-error: true
      - run: uv run bandit -r src -ll -q --configfile .bandit.yaml
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
