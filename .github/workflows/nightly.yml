# E16 #139: Nightly smoke — uv sync, status, test subset, wheel build. Notify on failure.
name: Nightly smoke

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

env:
  UV_VERSION: "0.8"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - name: CLI smoke
        run: uv run voiceforge status
      - name: Test subset
        run: uv run pytest tests/test_preflight.py tests/test_audio_capture.py tests/test_db_migrations.py -q --tb=line
      - name: Build wheel
        run: uv build --wheel

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: smoke
    if: always() && needs.smoke.result == 'failure'
    permissions:
      issues: write
    steps:
      - name: Create issue on nightly failure
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.runId;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${run}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Smoke failed (run ${run})`,
              body: `Nightly smoke workflow failed.\n\nRun: ${runUrl}\n\nPlease check the [Actions tab](${runUrl}) for logs.`,
              labels: ['chore', 'area:devops']
            });
