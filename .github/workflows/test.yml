name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.8"

jobs:
  quality:
    permissions:
      contents: read
      pull-requests: read
    name: quality (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          python-version: ${{ matrix.python-version }}
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: ./scripts/check_toolchain.sh
      - run: uv run ruff check src tests scripts
      - run: uv run mypy src/voiceforge/core src/voiceforge/llm src/voiceforge/rag src/voiceforge/stt --ignore-missing-imports
      - run: uv run pytest tests -q -m "not integration" --cov=src/voiceforge --cov-report=xml --cov-report=json --cov-fail-under=0
      - if: matrix.python-version == '3.12'
        run: ./scripts/check_new_code_coverage.sh --fail-under 20 --exclude web/server.py  # alpha: 20% new-code; raise later
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json

  cli-contract:
    permissions:
      contents: read
      pull-requests: read
    name: cli-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: ./scripts/check_cli_contract.sh

  eval:
    permissions:
      contents: read
      pull-requests: read
    name: eval (ROUGE-L)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: uv run pytest tests/eval/ -q

  db-migrations:
    permissions:
      contents: read
      pull-requests: read
    name: db-migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: uv run pytest tests/test_db_migrations.py -q

  e2e-smoke:
    permissions:
      contents: read
      pull-requests: read
    name: e2e-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: uv run pytest tests/test_cli_e2e_smoke.py -q

  stt-integration:
    permissions:
      contents: read
      pull-requests: read
    name: stt-integration (slow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: uv run pytest tests/test_stt_integration.py -v -m integration

  security:
    permissions:
      contents: read
      pull-requests: read
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: uv run pip-audit --desc --ignore-vuln CVE-2025-69872
      - run: uv run bandit -r src -ll -q --configfile .bandit.yaml

  desktop-audit:
    permissions:
      contents: read
      pull-requests: read
    name: desktop-audit (block 95)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - run: cd desktop && npm ci && npm audit --audit-level=high
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cd desktop/src-tauri && cargo audit
        continue-on-error: true

  desktop-build:
    permissions:
      contents: read
      pull-requests: read
    name: desktop-build (block 89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: cd desktop && npm ci
      - run: cd desktop && npm run tauri build
      - uses: actions/upload-artifact@v6
        with:
          name: desktop-bundle-linux
          path: desktop/src-tauri/target/release/bundle/
      - uses: actions/upload-artifact@v6
        with:
          name: desktop-appimage
          path: desktop/src-tauri/target/release/bundle/appimage/

  desktop-a11y:
    permissions:
      contents: read
      pull-requests: read
    name: desktop-a11y (block 87)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - run: cd desktop && npm ci && npm run build
      - run: cd desktop && npm run preview &
      - run: sleep 5 && npx pa11y@latest http://localhost:4173 --runner html --reporter tap
        continue-on-error: true
