name: Weekly maintenance state

on:
  schedule:
    - cron: "30 5 * * 5"
  workflow_dispatch:

concurrency:
  group: maintenance-weekly
  cancel-in-progress: true

env:
  UV_VERSION: "0.8"
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  issues: read

jobs:
  maintenance-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - name: Maintenance state
        run: uv run python scripts/check_maintenance_state.py --json | tee maintenance-state.json
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: maintenance-state
          path: maintenance-state.json
