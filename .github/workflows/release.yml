# E16 #139: Auto-release on tag push (v*). Wheel + GitHub Release + optional PyPI.
name: Release

on:
  push:
    tags:
      - "v*"

env:
  UV_VERSION: "0.8"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          python-version: "3.12"
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - run: uv sync --extra all
      - run: uv build --wheel
      - uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            dist/*.whl
            dist/sbom.cdx.json
          body_path: CHANGELOG.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps (Tauri + Flatpak)
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libssl-dev pkg-config
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable (S7637: full SHA)
      - name: Build desktop (.deb)
        run: |
          cd desktop
          npm ci
          npm run build
          npm run tauri build
      - name: Build Flatpak
        run: |
          chmod +x scripts/build-flatpak.sh
          ./scripts/build-flatpak.sh
      - name: Export Flatpak bundle
        run: |
          flatpak build-export export build
          flatpak build-bundle export com.voiceforge.app.flatpak com.voiceforge.app --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo
      - name: Upload Flatpak to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: com.voiceforge.app.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
