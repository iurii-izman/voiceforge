# Prometheus + Grafana for VoiceForge. Issue #64.
# Prerequisite: VoiceForge web server running (e.g. on host:8765).
# On Linux without host.docker.internal, use extra_hosts or run Prometheus with network_mode: host.

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Or run VoiceForge and Prometheus on host and point targets to 127.0.0.1:8765

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    # Import dashboard: UI → Dashboards → Import → Upload docs/grafana-voiceforge-dashboard.json
    # Add datasource: URL http://prometheus:9090

volumes:
  prometheus_data: {}
  grafana_data: {}
