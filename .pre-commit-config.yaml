# Use Python 3.12 for hook envs (avoids 3.14.x cache mismatch). On Fedora Atomic: run scripts/ensure_precommit_env.sh once (in toolbox).
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: block-direct-main-push
        name: block direct push to main
        entry: scripts/block_direct_main_push.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
